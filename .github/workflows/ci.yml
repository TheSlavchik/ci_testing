name: C# CI PR Pipeline

on:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Даем права на запись комментариев в PR
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Укажите вашу версию SDK

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with Coverage
        # --no-build экономит время, используя бинарники из шага Build
        # Threshold=90 уронит pipeline, если покрытие ниже 90%
        run: >
          dotnet test --no-build --configuration Release 
          --collect:"XPlat Code Coverage" 
          --results-directory ./coverage
          /p:Threshold=90 /p:ThresholdType=line

      - name: Create Coverage Summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: coverage/**/coverage.cobertura.xml
          badge: true
          fail_below_min: false # Порог уже проверяется на шаге dotnet test
          format: markdown
          output: both

      - name: Post Coverage Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md
